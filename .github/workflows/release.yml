name: Release

"on":
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish_windows_image:
        description: "Build and publish Windows container image"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  release-cli:
    name: Build and Release CLI Assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build release archives
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="${GITHUB_SHA}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.buildDate=${BUILD_DATE}"
          mkdir -p dist

          build_target() {
            local goos="$1"
            local goarch="$2"
            local ext=""
            local archive="tar.gz"
            if [[ "$goos" == "windows" ]]; then
              ext=".exe"
              archive="zip"
            fi

            local base="outwatch_${VERSION}_${goos}_${goarch}"
            local bin="${base}${ext}"

            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build -trimpath -ldflags "$LDFLAGS" -o "dist/${bin}" ./cmd/outwatch
            if [[ "$archive" == "zip" ]]; then
              (cd dist && zip -q "${base}.zip" "${bin}")
            else
              tar -C dist -czf "dist/${base}.tar.gz" "${bin}"
            fi
            rm -f "dist/${bin}"
          }

          build_target linux amd64
          build_target linux arm64
          build_target darwin amd64
          build_target darwin arm64
          build_target windows amd64

          (cd dist && sha256sum *.tar.gz *.zip > checksums.txt)

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt

  publish-image:
    name: Build and Publish Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set image name
        id: vars
        shell: bash
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.vars.outputs.image }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=latest

      - name: Build image for smoke test
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: outwatch-smoke:${{ github.ref_name }}

      - name: Smoke test container
        run: docker run --rm outwatch-smoke:${{ github.ref_name }} --version

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-image-windows:
    name: Build and Publish Windows Image
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_windows_image == true }}
    runs-on: [self-hosted, windows, x64, docker-windows]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set image name
        id: vars
        shell: pwsh
        run: |
          $image = "ghcr.io/$($env:GITHUB_REPOSITORY.ToLower())"
          "image=$image" >> $env:GITHUB_OUTPUT

      - name: Build Windows executable
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME
          $commit = $env:GITHUB_SHA
          $buildDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $ldflags = "-s -w -X main.version=$version -X main.commit=$commit -X main.buildDate=$buildDate"
          $env:CGO_ENABLED = "0"
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          go build -trimpath -ldflags $ldflags -o outwatch.exe ./cmd/outwatch

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Windows image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.windows
          push: true
          platforms: windows/amd64
          tags: |
            ${{ steps.vars.outputs.image }}:${{ github.ref_name }}-windows-amd64
            ${{ steps.vars.outputs.image }}:latest-windows-amd64
